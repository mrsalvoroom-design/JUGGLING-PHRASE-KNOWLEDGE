<!DOCTYPE html>
<html lang="en">
<head>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Font Awesome & Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Space Grotesk', sans-serif;
      background: linear-gradient(145deg, #0a0c1a 0%, #1a1f3a 50%, #2a1e3c 100%);
      min-height: 100vh;
      color: #fff;
      padding: 1.5rem;
    }

    .juggling-container {
      max-width: 1400px;
      margin: 0 auto;
      background: rgba(10, 12, 25, 0.7);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 2px solid rgba(255, 215, 0, 0.3);
      border-radius: 3.5rem;
      padding: 2rem 2.5rem;
      box-shadow: 0 30px 60px rgba(0,0,0,0.6);
    }

    /* header */
    .juggling-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 2.5rem;
      flex-wrap: wrap;
      gap: 1rem;
      background: linear-gradient(135deg, #1e1a3a, #2d1f4a);
      padding: 1.2rem 2.2rem;
      border-radius: 80px;
      border: 1px solid #ffd966;
    }

    .title h1 {
      font-size: 2.4rem;
      font-weight: 700;
      background: linear-gradient(135deg, #ffd966, #ffaa5e);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .title span {
      color: #a0a8ff;
      font-size: 1rem;
      display: block;
    }

    .badge-juggle {
      background: #ffd966;
      color: #1a1f3a;
      padding: 0.8rem 2rem;
      border-radius: 50px;
      font-weight: 700;
      font-size: 1.1rem;
      box-shadow: 0 5px 0 #b27315;
    }

    /* filter & search */
    .toolbar {
      display: flex;
      gap: 1rem;
      margin-bottom: 2rem;
      flex-wrap: wrap;
    }

    .search-box {
      flex: 1;
      background: rgba(255,255,255,0.05);
      border-radius: 60px;
      padding: 0.8rem 1.5rem;
      display: flex;
      align-items: center;
      gap: 1rem;
      border: 1px solid #ffd966;
    }

    .search-box i {
      color: #ffd966;
    }

    .search-box input {
      background: transparent;
      border: none;
      color: white;
      width: 100%;
      font-size: 1rem;
      outline: none;
    }

    .search-box input::placeholder {
      color: rgba(255,255,255,0.5);
    }

    .filter-select {
      background: rgba(255,255,255,0.05);
      border: 1px solid #ffd966;
      border-radius: 60px;
      padding: 0.8rem 2rem;
      color: white;
      font-family: inherit;
      cursor: pointer;
      outline: none;
    }

    .filter-select option {
      background: #1a1f3a;
    }

    /* stats info */
    .stats-info {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1rem;
      padding: 0 0.5rem;
    }

    .stats-info p {
      color: #ffd966;
      font-size: 0.9rem;
    }

    .stats-info i {
      margin-right: 0.3rem;
    }

    /* phrase grid */
    .phrase-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 1.2rem;
      max-height: 600px;
      overflow-y: auto;
      padding: 1rem;
      background: rgba(0,0,0,0.3);
      border-radius: 2rem;
      margin-bottom: 1rem;
    }

    .phrase-grid::-webkit-scrollbar {
      width: 8px;
    }
    .phrase-grid::-webkit-scrollbar-track {
      background: rgba(255,255,255,0.05);
      border-radius: 10px;
    }
    .phrase-grid::-webkit-scrollbar-thumb {
      background: #ffd966;
      border-radius: 10px;
    }

    .phrase-card {
      background: linear-gradient(145deg, #1e1a2f, #151225);
      border-radius: 1.2rem;
      padding: 1.5rem;
      cursor: pointer;
      transition: all 0.3s ease;
      border: 2px solid transparent;
      position: relative;
      overflow: hidden;
    }

    .phrase-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 4px;
      background: linear-gradient(90deg, #ffd966, #ffaa5e);
      transform: translateX(-100%);
      transition: transform 0.3s ease;
    }

    .phrase-card:hover::before {
      transform: translateX(0);
    }

    .phrase-card:hover {
      transform: translateY(-4px);
      border-color: #ffd966;
      box-shadow: 0 10px 30px rgba(255,215,0,0.2);
    }

    .phrase-number {
      display: inline-block;
      background: rgba(255, 215, 0, 0.2);
      color: #ffd966;
      padding: 0.3rem 1rem;
      border-radius: 30px;
      font-weight: 600;
      font-size: 0.8rem;
      margin-bottom: 1rem;
      border: 1px solid #ffd966;
    }

    .phrase-main {
      font-size: 1.3rem;
      font-weight: 600;
      color: #fff;
      margin-bottom: 0.8rem;
      line-height: 1.4;
    }

    .phrase-category {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      background: rgba(255,255,255,0.1);
      padding: 0.4rem 1rem;
      border-radius: 30px;
      font-size: 0.8rem;
      color: #aaa;
    }

    .phrase-category i {
      color: #ffd966;
    }

    .view-indicator {
      position: absolute;
      bottom: 1rem;
      right: 1rem;
      color: #ffd966;
      font-size: 0.8rem;
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    .phrase-card:hover .view-indicator {
      opacity: 1;
    }

    /* modal */
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.8);
      backdrop-filter: blur(10px);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 1000;
      padding: 1rem;
    }

    .modal-overlay.active {
      display: flex;
    }

    .modal-content {
      background: linear-gradient(145deg, #1a1f3a, #2a1e3c);
      border: 2px solid #ffd966;
      border-radius: 2.5rem;
      width: 90%;
      max-width: 1000px;
      max-height: 90vh;
      overflow-y: auto;
      padding: 2rem;
      position: relative;
      animation: modalSlideIn 0.3s ease;
    }

    @keyframes modalSlideIn {
      from {
        transform: translateY(-50px);
        opacity: 0;
      }
      to {
        transform: translateY(0);
        opacity: 1;
      }
    }

    .modal-content::-webkit-scrollbar {
      width: 8px;
    }
    .modal-content::-webkit-scrollbar-track {
      background: rgba(255,255,255,0.05);
      border-radius: 10px;
    }
    .modal-content::-webkit-scrollbar-thumb {
      background: #ffd966;
      border-radius: 10px;
    }

    .modal-close {
      position: absolute;
      top: 1.5rem;
      right: 1.5rem;
      background: rgba(255,255,255,0.1);
      border: 1px solid #ffd966;
      color: #ffd966;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.3s ease;
      font-size: 1.2rem;
    }

    .modal-close:hover {
      background: #ffd966;
      color: #1a1f3a;
      transform: rotate(90deg);
    }

    .modal-header {
      margin-bottom: 2rem;
      padding-right: 3rem;
    }

    .modal-header .phrase-label {
      color: #ffd966;
      font-size: 0.9rem;
      letter-spacing: 2px;
      margin-bottom: 0.5rem;
    }

    .modal-header .phrase-big {
      font-size: 2.2rem;
      font-weight: 700;
      background: linear-gradient(135deg, #fff, #ffd966);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 0.5rem;
      line-height: 1.3;
    }

    .modal-header .phrase-category-badge {
      display: inline-block;
      background: rgba(255, 215, 0, 0.2);
      color: #ffd966;
      padding: 0.5rem 1.5rem;
      border-radius: 50px;
      font-size: 0.9rem;
      border: 1px solid #ffd966;
    }

    .variations-count {
      margin: 1.5rem 0 1rem;
      color: #ffd966;
      font-size: 1rem;
    }

    .variations-count i {
      margin-right: 0.5rem;
    }

    .variations-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 1.2rem;
      margin-bottom: 2rem;
    }

    .variation-card {
      background: linear-gradient(145deg, #1e1a2f, #151225);
      border-radius: 1.2rem;
      padding: 1.5rem;
      border-left: 4px solid #ffd966;
      transition: all 0.3s ease;
    }

    .variation-card:hover {
      transform: translateX(5px) translateY(-3px);
      border-left-width: 8px;
      box-shadow: 0 5px 20px rgba(255,215,0,0.2);
    }

    .variation-number {
      color: #ffd966;
      font-size: 0.8rem;
      margin-bottom: 0.8rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .variation-sentence {
      font-size: 1rem;
      line-height: 1.6;
      color: #fff;
      font-style: italic;
      margin-bottom: 1rem;
      padding-left: 0.5rem;
      border-left: 2px solid rgba(255,215,0,0.3);
    }

    .variation-translation {
      padding-top: 0.8rem;
      border-top: 1px solid rgba(255,215,0,0.2);
      color: #aaa;
      font-size: 0.9rem;
      display: flex;
      align-items: flex-start;
      gap: 0.5rem;
    }

    .variation-translation i {
      color: #ffd966;
      font-size: 0.8rem;
      margin-top: 0.2rem;
    }

    .modal-footer {
      display: flex;
      justify-content: space-between;
      margin-top: 2rem;
      gap: 1rem;
    }

    .modal-nav-btn {
      background: linear-gradient(145deg, #1e1a2f, #151225);
      border: 1px solid #ffd966;
      padding: 0.8rem 1.5rem;
      border-radius: 50px;
      color: white;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 10px;
      transition: 0.2s;
      font-size: 0.9rem;
    }

    .modal-nav-btn:hover {
      background: #ffd966;
      color: #1a1f3a;
    }

    .modal-nav-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    /* footer */
    .nav-footer {
      display: flex;
      justify-content: center;
      align-items: center;
      margin-top: 1rem;
    }

    .btn-home {
      background: linear-gradient(145deg, #ffd966, #ffaa5e);
      color: #1a1f3a;
      border: 1px solid white;
      padding: 1rem 2rem;
      border-radius: 50px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 10px;
      transition: 0.2s;
    }

    .btn-home:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 20px rgba(255,215,0,0.3);
    }
  </style>
</head>
<body>
  <div class="juggling-container">

    <!-- toolbar -->

      </div>
      <select class="filter-select" id="categoryFilter">

          "Saya tidak bermaksud melakukan itu.",
          "Saya harap Anda bisa memaafkan saya.",
          "Saya benar-benar menyesal."
        ]
      },
      {
        id: 9,
        phrase: "I agree",
        category: "opinion",
        variations: [
          "I'm with you on that.",
          "That's exactly how I feel.",
          "I couldn't agree more.",
          "You're absolutely right.",
          "I share your view.",
          "That makes perfect sense to me.",
          "I'm of the same opinion.",
          "I concur completely.",
          "That's my thoughts exactly.",
          "I think so too."
        ],
        translations: [
          "Saya setuju denganmu tentang itu.",
          "Itulah yang saya rasakan.",
          "Saya sangat setuju.",
          "Kamu benar sekali.",
          "Saya sependapat denganmu.",
          "Itu masuk akal sekali bagi saya.",
          "Saya punya pendapat yang sama.",
          "Saya setuju sepenuhnya.",
          "Itu persis pemikiran saya.",
          "Saya juga berpikir begitu."
        ]
      },
      {
        id: 10,
        phrase: "I'm busy",
        category: "feelings",
        variations: [
          "I have a lot on my plate right now.",
          "I'm tied up at the moment.",
          "I'm swamped with work.",
          "I don't have time right now.",
          "I'm fully occupied.",
          "My schedule is packed.",
          "I'm in the middle of something.",
          "I can't right now.",
          "I have prior commitments.",
          "I'm not available at the moment."
        ],
        translations: [
          "Saya punya banyak pekerjaan sekarang.",
          "Saya sedang sibuk saat ini.",
          "Saya kebanjiran pekerjaan.",
          "Saya tidak punya waktu sekarang.",
          "Saya sibuk sekali.",
          "Jadwal saya padat.",
          "Saya sedang melakukan sesuatu.",
          "Saya tidak bisa sekarang.",
          "Saya punya komitmen lain.",
          "Saya tidak tersedia saat ini."
        ]
      }
    ];

    // Generate 65 more phrases with meaningful variations
    const categories = ["greetings", "opinion", "requests", "feelings", "business"];
    const basePhrases = [
      "Good morning", "See you later", "Nice to meet you", "How are you?", "I'm fine",
      "What's up?", "Long time no see", "Take care", "Have a nice day", "Good luck",
      "Congratulations", "Well done", "Keep going", "Don't worry", "No problem",
      "You're welcome", "My pleasure", "That's great", "Awesome", "Perfect",
      "I love it", "I like it", "It's beautiful", "Amazing", "Wonderful",
      "I'm tired", "I'm hungry", "I'm thirsty", "I'm sleepy", "I'm excited",
      "Let's go", "Come here", "Look at this", "Listen to me", "Wait a moment",
      "Hurry up", "Slow down", "Be careful", "Watch out", "Pay attention",
      "I know", "I don't know", "I remember", "I forgot", "I understand",
      "Tell me", "Show me", "Help me", "Call me", "Follow me",
      "Maybe", "Perhaps", "Probably", "Definitely", "Absolutely",
      "Of course", "Certainly", "Sure", "Okay", "Alright"
    ];

    // Helper function to generate variations for base phrases
    function generateVariations(phrase, count = 8) {
      const variations = [];
      const translations = [];
      
      const templates = [
        `"${phrase}" is what I want to say.`,
        `I would like to express: "${phrase}"`,
        `In other words, ${phrase.toLowerCase()}.`,
        `What I mean is ${phrase.toLowerCase()}.`,
        `Allow me to put it this way: ${phrase}`,
        `Another way to say this is "${phrase}"`,
        `Let me rephrase that: ${phrase}`,
        `To put it differently, ${phrase.toLowerCase()}.`,
        `I might express it as "${phrase}"`,
        `One could say ${phrase.toLowerCase()}.`
      ];
      
      for (let i = 0; i < count; i++) {
        variations.push(templates[i % templates.length]);
        translations.push(`Cara lain untuk mengatakan: ${phrase}`);
      }
      
      return { variations, translations };
    }

    for (let i = 11; i <= 75; i++) {
      let baseIdx = (i - 11) % basePhrases.length;
      let phrase = basePhrases[baseIdx];
      let category = categories[(i - 11) % categories.length];
      
      const { variations, translations } = generateVariations(phrase, 8);
      
      phrases.push({
        id: i,
        phrase: phrase,
        category: category,
        variations: variations,
        translations: translations
      });
    }

    // ====================== STATE ======================
    let currentPhraseId = 1;
    const phraseGrid = document.getElementById('phraseGrid');
    const searchInput = document.getElementById('searchInput');
    const categoryFilter = document.getElementById('categoryFilter');
    const homeBtn = document.getElementById('homeBtn');
    const totalPhrasesSpan = document.getElementById('totalPhrases');

    // Modal elements
    const modalOverlay = document.getElementById('modalOverlay');
    const modalContent = document.getElementById('modalContent');
    const modalPhrase = document.getElementById('modalPhrase');
    const modalCategory = document.getElementById('modalCategory');
    const modalVariationsGrid = document.getElementById('modalVariationsGrid');
    const modalPrevBtn = document.getElementById('modalPrevBtn');
    const modalNextBtn = document.getElementById('modalNextBtn');
    const closeModal = document.getElementById('closeModal');
    const variationsCount = document.getElementById('variationsCount');

    // Update total phrases
    totalPhrasesSpan.textContent = phrases.length;

    // Render grid frasa (MENU UTAMA)
    function renderGrid() {
      const searchTerm = searchInput.value.toLowerCase();
      const category = categoryFilter.value;
      
      const filtered = phrases.filter(p => {
        const matchSearch = p.phrase.toLowerCase().includes(searchTerm);
        const matchCategory = category === 'all' || p.category === category;
        return matchSearch && matchCategory;
      });

      let html = '';
      filtered.forEach(p => {
        html += `
          <div class="phrase-card" data-id="${p.id}">
            <div class="phrase-number">#${p.id}</div>
            <div class="phrase-main">${p.phrase}</div>
            <div class="phrase-category">
              <i class="fas fa-tag"></i> ${p.category}
            </div>
            <div class="view-indicator">
              <i class="fas fa-eye"></i> Lihat ${p.variations.length} variasi
            </div>
          </div>
        `;
      });
      
      phraseGrid.innerHTML = html;

      // Add click listeners untuk membuka modal
      document.querySelectorAll('.phrase-card').forEach(card => {
        card.addEventListener('click', () => {
          const id = parseInt(card.dataset.id);
          openModal(id);
        });
      });
    }

    // Buka modal dan tampilkan variasi
    function openModal(id) {
      currentPhraseId = id;
      const phrase = phrases.find(p => p.id === id);
      if (!phrase) return;

      // Set modal header
      modalPhrase.textContent = `"${phrase.phrase}"`;
      modalCategory.textContent = phrase.category;
      variationsCount.textContent = phrase.variations.length;

      // Render variasi
      let varsHtml = '';
      for (let i = 0; i < phrase.variations.length; i++) {
        varsHtml += `
          <div class="variation-card">
            <div class="variation-number">
              <i class="fas fa-circle" style="font-size:0.5rem;"></i> VARIATION ${i+1}
            </div>
            <div class="variation-sentence">"${phrase.variations[i]}"</div>
            <div class="variation-translation">
              <i class="fas fa-language"></i>
              ${phrase.translations[i] || phrase.variations[i]}
            </div>
          </div>
        `;
      }
      modalVariationsGrid.innerHTML = varsHtml;

      // Tampilkan modal
      modalOverlay.classList.add('active');
      document.body.style.overflow = 'hidden';
    }

    // Tutup modal
    function closeModalFunc() {
      modalOverlay.classList.remove('active');
      document.body.style.overflow = 'auto';
    }

    // Navigasi modal
    function navigateModal(direction) {
      let newId = direction === 'next' ? currentPhraseId + 1 : currentPhraseId - 1;
      
      if (newId < 1) newId = phrases.length;
      if (newId > phrases.length) newId = 1;
      
      openModal(newId);
    }

    // Event listeners
    searchInput.addEventListener('input', renderGrid);
    categoryFilter.addEventListener('change', renderGrid);

    homeBtn.addEventListener('click', () => {
      phraseGrid.scrollIntoView({ behavior: 'smooth' });
    });

    // Modal events
    closeModal.addEventListener('click', closeModalFunc);
    
    modalOverlay.addEventListener('click', (e) => {
      if (e.target === modalOverlay) {
        closeModalFunc();
      }
    });

    modalPrevBtn.addEventListener('click', () => navigateModal('prev'));
    modalNextBtn.addEventListener('click', () => navigateModal('next'));

    // Keyboard navigation
    document.addEventListener('keydown', (e) => {
      if (!modalOverlay.classList.contains('active')) return;
      
      if (e.key === 'Escape') {
        closeModalFunc();
      } else if (e.key === 'ArrowLeft') {
        navigateModal('prev');
      } else if (e.key === 'ArrowRight') {
        navigateModal('next');
      }
    });

    // Initial render
    renderGrid();
  </script>
</body>
</html>
